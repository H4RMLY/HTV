<!doctype html>
<head>
    <title>MTV</title>
    <script defer src="/js/index.js"></script>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="nav">
        <i id="menu_button" class="fa fa-reorder"></i>
        <img id="logo_main" alt="Logo" src="/assets/images/MTV-logo.png">
        <div id="login_button">Log In</div>
    </div>
    <div id="content_container">
        <i id="next_vid" class="fa fa-angle-left"></i>
        <div id="main_container">

            <div id="video_container">
                <video autoplay muted controls class="video">
                    <source id="video_source" src="/assets/videos/Hayley Williams - Glum (Official Video).mp4" type="video/mp4">
                </video>
            </div>
            <div id="video_information">
                <div id="video_title">Glum</div><div id="info_spacer">//</div><div id="video_artist">Hayley Williams</div>
            </div>
        </div>
        <i id="prev_vid" class="fa fa-angle-right"></i>
    </div>
</body>



<!--TEMPLATES-->
<template id="video_temp">
    <video controls class="video">
        <source id="video_source" src="PLACEHOLDER" type="video/mp4">
    </video>
</template>
